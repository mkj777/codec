name: Add issues to project

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: github.com/users/mkj777/projects/2
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
